<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Manager</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="topbar">

    <h1 class="logoText">Game Manager</h1>

    <!-- AUTH BUTTONS (LOGGED OUT) -->
    <div id="authButtons" class="authButtons">

      <button id="googleLoginBtn" class="btn-primary" type="button">
        Continue with Google
      </button>

      <button id="openAuthBtn" class="btn-secondary" type="button">
        Finish Profile
      </button>

    </div>

    <!-- PROFILE AREA (LOGGED IN) -->
    <div id="profileArea" class="profileArea hidden">

      <div class="profile-wrapper">

        <button id="profileBtn" class="profileBtn" type="button">

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="User profile picture"
          />

        </button>

        <!-- DROPDOWN MENU -->
        <div id="dropdownMenu" class="menu hidden">

          <div class="menu-user">

            <img id="menuPfp" src="./Images/defaultPFP.jpg" alt="Profile picture" />

            <div class="menu-user-info">
              <span id="menuName">Guest</span>
              <small id="menuEmail"></small>
            </div>

          </div>

          <div class="menuDivider"></div>

          <button id="profilePageBtn" class="menuBtn" type="button">
            Profile
          </button>

          <button onclick="window.location.href='leaderboard.html'"
                  class="menuBtn"
                  type="button">
            Leaderboard
          </button>

          <button id="logoutBtn" class="menuBtn dangerBtn" type="button">
            Logout
          </button>

        </div>

      </div>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->
  <main class="homeMain">

    <section class="homeHero">

      <div class="heroGlow"></div>

      <h2>Welcome ヾ(˶ᵔ ᗜ ᵔ˶)</h2>

      <p class="muted">
        Compete in multiplayer games and climb the leaderboard.
      </p>

      <button id="playBtn" class="play-btn" type="button">
        Play
      </button>

      <div id="quickStats" class="statsRow hidden">

        <div class="miniStat">
          <span>Wins</span>
          <strong id="statWins">0</strong>
        </div>

        <div class="miniStat">
          <span>Games</span>
          <strong id="statGames">0</strong>
        </div>

        <div class="miniStat">
          <span>Win Rate</span>
          <strong id="statRate">0%</strong>
        </div>

      </div>

    </section>
  </main>

  <!-- =========================
       PROFILE SETUP POPUP
       (ONLY USED AFTER GOOGLE LOGIN)
  ========================== -->
  <div id="authPopup" class="popup hidden">

    <div class="popup-content">

      <h2 id="authTitle">Finish your profile</h2>

      <p class="muted">
        Choose your username and age to complete setup.
      </p>

      <input
        id="authUsername"
        type="text"
        placeholder="Username"
      />

      <input
        id="authAge"
        type="number"
        placeholder="Age (optional)"
      />

      <button id="submitAuthBtn" type="button">
        Complete Profile
      </button>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script type="module" src="home.js"></script>

</body>

</html>
