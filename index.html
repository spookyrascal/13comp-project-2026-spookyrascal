<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Game Manager</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->

  <header class="topbar">

    <h1 class="logoText">
      Game Manager
    </h1>

    <!-- LOGGED OUT -->
    <div
      id="authButtons"
      class="authButtons"
    >

      <button
        id="openAuthBtn"
        class="btn-primary"
        type="button"
      >
        Sign In / Create Account
      </button>

    </div>

    <!-- LOGGED IN -->
    <div
      id="profileArea"
      class="profileArea hidden"
    >

      <div class="profile-wrapper">

        <button
          id="profileBtn"
          class="profileBtn"
          title="Open profile menu"
          type="button"
        >

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="User profile picture"
          />

        </button>

        <!-- DROPDOWN -->
        <div
          id="dropdownMenu"
          class="menu hidden"
        >

          <div class="menu-user">

            <img
              id="menuPfp"
              src="./Images/defaultPFP.jpg"
              alt="Profile picture"
            />

            <div class="menu-user-info">

              <span id="menuName">
                Guest
              </span>

              <small id="menuEmail"></small>

            </div>

          </div>

          <div class="menuDivider"></div>

          <button
            id="profilePageBtn"
            class="menuBtn"
            type="button"
          >
            Profile
          </button>

          <button
            onclick="window.location.href='leaderboard.html'"
            class="menuBtn"
            type="button"
          >
            Leaderboard
          </button>

          <button
            id="logoutBtn"
            class="menuBtn dangerBtn"
            type="button"
          >
            Logout
          </button>

        </div>

      </div>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->

  <main class="homeMain">

    <section class="homeHero">

      <div class="heroGlow"></div>

      <h2>
        Welcome ヾ(˶ᵔ ᗜ ᵔ˶)
      </h2>

      <p class="muted">
        Compete in multiplayer games and climb the leaderboard.
      </p>

      <button
        id="playBtn"
        class="play-btn"
        type="button"
      >
        Play
      </button>

      <!-- QUICK STATS -->
      <div
        id="quickStats"
        class="statsRow hidden"
      >

        <div class="miniStat">

          <span>Wins</span>

          <strong id="statWins">
            0
          </strong>

        </div>

        <div class="miniStat">

          <span>Games</span>

          <strong id="statGames">
            0
          </strong>

        </div>

        <div class="miniStat">

          <span>Win Rate</span>

          <strong id="statRate">
            0%
          </strong>

        </div>

      </div>

    </section>

  </main>

  <!-- =========================
       AUTH POPUP
  ========================== -->

  <div
    id="authPopup"
    class="popup hidden"
  >

    <div class="popup-content">

      <!-- CLOSE BUTTON -->
      <button
        id="closePopupBtn"
        class="closePopupBtn"
        type="button"
      >
        ×
      </button>

      <h2 id="authTitle">
        Sign In / Create Account
      </h2>

      <p class="authSubtext">
        Continue with email or Google
      </p>

      <!-- USERNAME -->
      <input
        id="authUsername"
        type="text"
        placeholder="Username"
      />

      <!--AGE -->
      <input
        id="authAge"
        type="number"
        placeholder="Age"
      />

      <!-- EMAIL -->
      <input
        id="authEmail"
        type="email"
        placeholder="Email"
        autocomplete="email"
      />

      <!-- PASSWORD -->
      <div class="passwordWrap">

        <input
          id="authPassword"
          type="password"
          placeholder="Password"
          autocomplete="current-password"
        />

        <button
          id="togglePasswordBtn"
          class="togglePasswordBtn"
          type="button"
        >
          👁
        </button>

      </div>

      <!-- CONTINUE -->
      <button
        id="submitAuthBtn"
        class="btn-primary authMainBtn"
        type="button"
      >
        Continue
      </button>

      <!-- DIVIDER -->
      <div class="authDivider">
        <span>OR</span>
      </div>

      <!-- GOOGLE -->
      <button
        id="googleLoginBtn"
        class="btn-secondary"
        type="button"
      >
        Continue with Google
      </button>

      <!-- STATUS -->
      <p
        id="authStatus"
        class="authStatus"
      ></p>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->

  <script
    type="module"
    src="home.js"
  ></script>

</body>

</html>
