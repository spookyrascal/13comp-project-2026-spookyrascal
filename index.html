<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Manager</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="topbar">

    <h1 class="logoText">Game Manager</h1>

    <!-- AUTH BUTTONS (LOGGED OUT STATE) -->
    <div id="authButtons" class="authButtons">

      <button id="googleLoginBtn" class="btn-primary">
        Continue with Google
      </button>

      <button id="openAuthBtn" class="btn-secondary">
        Login or Create Account
      </button>

    </div>

    <!-- PROFILE AREA (LOGGED IN STATE) -->
    <div id="profileArea" class="profileArea hidden">

      <div class="profile-wrapper">

        <button id="profileBtn" class="profileBtn" title="Open profile menu">

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="User profile picture"
          />

        </button>

        <!-- DROPDOWN MENU -->
        <div id="dropdownMenu" class="menu hidden">

          <div class="menu-user">

            <img
              id="menuPfp"
              src="./Images/defaultPFP.jpg"
              alt="Profile picture"
            />

            <div class="menu-user-info">

              <span id="menuName">Guest</span>
              <small id="menuEmail"></small>

            </div>

          </div>

          <div class="menuDivider"></div>

          <button id="profilePageBtn" class="menuBtn">
            My Profile
          </button>

          <button
            onclick="window.location.href='leaderboard.html'"
            class="menuBtn"
          >
            Leaderboard
          </button>

          <button id="logoutBtn" class="menuBtn dangerBtn">
            Logout
          </button>

        </div>

      </div>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->
  <main class="homeMain">

    <section class="homeHero">

      <div class="heroGlow"></div>

      <h2>Welcome</h2>

      <p class="muted">
        Compete in multiplayer games and climb the leaderboard.
      </p>

      <button id="playBtn" class="play-btn">
        Play
      </button>

      <div id="quickStats" class="statsRow hidden">

        <div class="miniStat">
          <span>Wins</span>
          <strong id="statWins">0</strong>
        </div>

        <div class="miniStat">
          <span>Games</span>
          <strong id="statGames">0</strong>
        </div>

        <div class="miniStat">
          <span>Win Rate</span>
          <strong id="statRate">0%</strong>
        </div>

      </div>

    </section>

    <!-- NAV CARDS -->
    <section class="homeCards">

      <div class="gameCard" onclick="window.location.href='games.html'">
        <h3>Games</h3>
        <p>Real-time multiplayer battles</p>
      </div>

      <div class="gameCard" onclick="window.location.href='profile.html'">
        <h3>Profile</h3>
        <p>Manage stats and settings</p>
      </div>

      <div class="gameCard" onclick="window.location.href='leaderboard.html'">
        <h3>Leaderboard</h3>
        <p>See top players</p>
      </div>

    </section>

  </main>

  <!-- =========================
       AUTH POPUP
  ========================== -->
  <div id="authPopup" class="popup hidden">

    <div class="popup-content">

      <h2 id="authTitle">Login</h2>

      <!-- ONLY SHOW WHEN SIGN UP -->
      <input
        id="authUsername"
        type="text"
        placeholder="Username"
        class="hidden"
      />

      <input
        id="authEmail"
        type="email"
        placeholder="Email"
      />

      <input
        id="authAge"
        type="number"
        placeholder="Age (optional)"
        class="hidden"
      />

      <input
        id="authPassword"
        type="password"
        placeholder="Password"
      />

      <button id="submitAuthBtn">
        Login
      </button>

      <button id="switchAuthModeBtn">
        Create account instead
      </button>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script type="module" src="home.js"></script>

</body>

</html>
