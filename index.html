<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen" class="hidden">
  <div class="spinner"></div>
  <p>Loading...</p>
</div>

<!-- HEADER -->
<header class="topbar">
  <h1 class="logoText">Game Manager</h1>

  <div id="authButtons" class="authButtons">
    <button id="openAuthBtn" class="btn-primary"> Sign up / Sign In</button>
  </div>
</header>

<!-- MAIN -->
<main class="homeMain">
  <section class="homeHero">
    <h2>Welcome</h2>
    <p class="muted">Sign in to play and save your progress.</p>

    <button id="openAuthBtn2" class="play-btn">Start Playing</button>
  </section>
</main>

<!-- AUTH POPUP -->
<div id="authPopup" class="popup hidden">
  <div class="popup-content">

    <h2>Join Game Manager</h2>

    <input id="authUsername" type="text" placeholder="Username" />
    <input id="authAge" type="number" placeholder="Age" />

    <div class="divider"></div>

    <button id="googleLoginBtn" class="btn-primary">
      Continue with Google
    </button>

    <button id="closeAuthBtn" class="btn-secondary">
      Cancel
    </button>

  </div>
</div>

<script type="module" src="home.js"></script>
</body>
</html>
