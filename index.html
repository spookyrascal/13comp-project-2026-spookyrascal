<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Manager</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="topbar">

  <h1 class="logoText">Game Manager</h1>

  <!-- LOGGED OUT -->
  <div id="authButtons" class="authButtons">
    <button id="openAuthBtn" class="btn-primary">
      Sign In / Create Account
    </button>
  </div>

  <!-- LOGGED IN -->
  <div id="profileArea" class="profileArea hidden">

    <div class="profile-wrapper">

      <button id="profileBtn" class="profileBtn">
        <img id="profileImage" class="profile-img" src="./Images/defaultPFP.jpg" />
      </button>

      <div id="dropdownMenu" class="menu hidden">

        <div class="menu-user" style="display:flex; gap:10px; align-items:center;">
          <img id="menuPfp" class="profile-img" src="./Images/defaultPFP.jpg"/>

          <div>
            <div id="menuName">Player</div>
            <small id="menuEmail"></small>
          </div>
        </div>

        <hr style="border:1px solid rgba(0,255,136,0.1)"/>

        <button onclick="window.location.href='profile.html'">Profile</button>
        <button onclick="window.location.href='leaderBoard.html'">Leaderboard</button>
        <button id="logoutBtn" class="dangerBtn">Logout</button>

      </div>
    </div>
  </div>

</header>

<main class="homeMain">

  <section class="homeHero">

    <h2>Welcome (｡•̀ᴗ-)✧</h2>
    <p>Compete. Win. Dominate.</p>

    <button onclick="window.location.href='games.html'">Play Games</button>

    <div id="quickStats" class="statsRow hidden">
      <div>Wins: <strong id="statWins">0</strong></div>
      <div>Games: <strong id="statGames">0</strong></div>
      <div>Win Rate: <strong id="statRate">0%</strong></div>
    </div>

  </section>

</main>

<!-- =========================
     AUTH POPUP 
========================= -->

<div id="authPopup" class="popup hidden">

  <div class="popup-content">

    <button id="closePopupBtn" class="closeBtn">×</button>

    <h2>Welcome</h2>


    <div class="tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="signupTab">Sign Up</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">

      <input id="loginEmail" type="email" placeholder="Email"/>
      <input id="loginPassword" type="password" placeholder="Password"/>

      <button id="loginBtn" class="btn-primary">Login</button>

      <div style="margin:10px 0; opacity:0.6;">OR</div>

      <button id="googleLoginBtn" class="btn-secondary">
        Google Login
      </button>

    </div>

    <!-- SIGNUP -->
    <div id="signupForm" class="hidden">

      <input id="signupUsername" type="text" placeholder="Username"/>
      <input id="signupAge" type="number" placeholder="Age"/>
      <input id="signupEmail" type="email" placeholder="Email"/>
      <input id="signupPassword" type="password" placeholder="Password"/>

      <button id="signupBtn" class="btn-primary">Create Account</button>

      <div style="margin:10px 0; opacity:0.6;">OR</div>

      <button id="googleSignupBtn" class="btn-secondary">
        Google Signup
      </button>

    </div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module" src="home.js"></script>

</body>
</html>
