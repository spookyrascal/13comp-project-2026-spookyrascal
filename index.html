<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Game Manager</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="topbar">

    <h1>🎮 Game Manager</h1>

    <!-- AUTH BUTTONS (LOGGED OUT STATE) -->
    <div id="authButtons" class="auth-buttons">

      <button id="loginBtn">Login</button>
      <button id="emailSignupBtn">Sign Up</button>

    </div>

    <!-- PROFILE (LOGGED IN STATE) -->
    <div id="profileArea" class="profile-area hidden">

      <div class="profile-wrapper">

        <!-- PROFILE BUTTON -->
        <button id="profileBtn" class="profile-trigger">

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="Profile"
          />

        </button>

        <!-- DROPDOWN -->
        <div id="dropdownMenu" class="menu hidden">

          <!-- USER INFO -->
          <div class="menu-user">

            <img
              id="menuPfp"
              src="./Images/defaultPFP.jpg"
              alt="User"
            />

            <div class="menu-user-text">

              <span id="menuName">Guest</span>
              <small id="menuEmail">Not signed in</small>
              <small id="menuAge">Age: -</small>

            </div>

          </div>

          <!-- ACTIONS -->
          <div class="menu-actions">

            <button id="logoutBtn">
              Logout
            </button>

          </div>

        </div>

      </div>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->
  <main>

    <h2 id="welcomeText">Welcome 👋</h2>

    <button id="playBtn" class="play-btn">
      ▶ Play
    </button>

  </main>

  <!-- =========================
       USERNAME POPUP
  ========================== -->
  <div id="usernamePopup" class="popup hidden">

    <div class="popup-content">

      <h2>Choose Username</h2>

      <input
        id="usernameInput"
        type="text"
        placeholder="Enter username"
        maxlength="20"
      />

      <button id="saveUsernameBtn">
        Save Username
      </button>

    </div>

  </div>

  <!-- =========================
       SIGNUP POPUP
  ========================== -->
  <div id="signupPopup" class="popup hidden">

    <div class="popup-content">

      <h2>Create Account</h2>

      <input
        id="signupUsername"
        type="text"
        placeholder="Username"
        maxlength="20"
      />

      <input
        id="signupEmail"
        type="email"
        placeholder="Email"
      />

      <input
        id="signupPassword"
        type="password"
        placeholder="Password"
      />

      <input
        id="signupAge"
        type="number"
        placeholder="Age"
        min="5"
        max="120"
      />

      <button id="createAccountBtn">
        Create Account
      </button>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script type="module" src="home.js"></script>

</body>

</html>
