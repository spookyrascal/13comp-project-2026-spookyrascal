<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Game Manager</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header>

<span id="statusIcon class="status-dot></span>


    <div class="header-left">
      <h1>Game Manager</h1>
    </div>

    <div class="header-right">

      <!-- Profile Button -->
      <button 
        id="profileBtn" 
        class="profile-icon" 
        aria-label="Profile Menu"
        aria-haspopup="true"
        aria-expanded="false"
      >
        <img
          id="profileImage"
          class="profile-img"
          src="./Images/defaultPFP.jpg"
          alt="Profile Picture"
          onerror="this.src='./Images/defaultPFP.jpg'">
      </button>

      <!-- Dropdown Menu -->
      <div id="dropdownMenu" class="dropdown hidden">
        <button id="signInBtn">Sign In</button>
        <button id="signUpBtn">Sign Up</button>
        <button id="signOutBtn" class="hidden">Sign Out</button>
      </div>
  
    </div>

  </header>


  <!-- =========================
       MAIN
  ========================== -->
  <main>
    <button id="playBtn" class="play-btn">Play</button>

    <!-- =========================
         SIGN UP POPUP
    ========================== -->
    <div id="signUpPopup" class="popup-overlay" role="dialog" aria-modal="true">
      <div class="popup-content">
        <span id="closePopup" class="close-btn">&times;</span>
        
        <h2>Create Account</h2>
        <form id="signUpForm">

          <label for="displayName">Display Name:</label>
          <input 
            type="text" 
            id="displayName" 
            name="displayName" 
            maxlength="30" 
            autocomplete="nickname"
            required>

          <label for="signupEmail">Email:</label>
          <input 
            type="email" 
            id="signupEmail" 
            name="email" 
            autocomplete="email"
            required>

          <label for="signupPassword">Password:</label>
          <input 
            type="password" 
            id="signupPassword" 
            name="password" 
            minlength="6"
            autocomplete="new-password"
            required>

          <button type="submit">Sign Up</button>

        </form>
      </div>  
    </div>

  </main>


  <!-- =========================
       SCRIPTS
  ========================== -->
  <script type="module" src="home.js"></script>

</body>

</html>
