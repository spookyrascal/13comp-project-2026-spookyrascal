<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Game Manager</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="topbar">

    <h1>🎮 Game Manager</h1>

    <!-- =========================
         AUTH BUTTONS
    ========================== -->
    <div
      id="authButtons"
      class="auth-buttons"
    >

      <button id="googleLoginBtn">
        Sign in with Google
      </button>

      <button id="openAuthBtn">
        Login / Sign Up
      </button>

    </div>

    <!-- =========================
         PROFILE AREA
    ========================== -->
    <div
      id="profileArea"
      class="profile-area hidden"
    >

      <div class="profile-wrapper">

        <!-- PROFILE BUTTON -->
        <button
          id="profileBtn"
          class="profile-trigger"
        >

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="Profile"
          />

        </button>

        <!-- DROPDOWN MENU -->
        <div
          id="dropdownMenu"
          class="menu hidden"
        >

          <!-- USER INFO -->
          <div class="menu-user">

            <img
              id="menuPfp"
              src="./Images/defaultPFP.jpg"
              alt="User"
            />

            <div class="menu-user-text">

              <span id="menuName">
                Guest
              </span>

              <small id="menuEmail">
                Not signed in
              </small>

            </div>

          </div>

          <!-- ACTIONS -->
          <div class="menu-actions">

            <button id="logoutBtn">
              Logout
            </button>

          </div>

        </div>

      </div>

    </div>

  </header>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <main>

    <h2 id="welcomeText">
      Welcome 👋
    </h2>

    <button
      id="playBtn"
      class="play-btn"
    >
      ▶ Play
    </button>

  </main>

  <!-- =========================
       AUTH POPUP
  ========================== -->
  <div
    id="authPopup"
    class="popup hidden"
  >

    <div class="popup-content">

      <!-- TITLE -->
      <h2 id="authTitle">
        Login
      </h2>

      <!-- USERNAME -->
      <input
        id="authUsername"
        type="text"
        placeholder="Username"
        maxlength="20"
        class="hidden"
      />

      <!-- EMAIL -->
      <input
        id="authEmail"
        type="email"
        placeholder="Email"
      />

      <!-- PASSWORD -->
      <input
        id="authPassword"
        type="password"
        placeholder="Password"
      />

      <!-- SUBMIT -->
      <button id="submitAuthBtn">
        Login
      </button>

      <!-- SWITCH MODE -->
      <button id="switchAuthModeBtn">

        Need an account?

      </button>

    </div>

  </div>

  <!-- =========================
       SCRIPT
  ========================== -->
  <script
    type="module"
    src="home.js"
  ></script>

</body>

</html>
