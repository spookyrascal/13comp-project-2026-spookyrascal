<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Game Manager</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header>

    <div class="header-left">
      <h1>🎮 Game Manager</h1>
    </div>

    <div class="header-right">

      <div class="profile-wrapper">

        <!-- PROFILE BUTTON -->
        <button id="profileBtn" class="profile-trigger" aria-expanded="false">

          <img
            id="profileImage"
            class="profile-img"
            src="./Images/defaultPFP.jpg"
            alt="Profile"
          >

        </button>

        <!-- DROPDOWN -->
        <div id="dropdownMenu" class="discord-menu hidden">

          <!-- USER INFO -->
          <div class="discord-user">

            <img
              id="menuPfp"
              src="./Images/defaultPFP.jpg"
              alt="User"
            >

            <div class="discord-user-info">
              <span id="menuName">Guest</span>
              <small id="menuEmail">Not signed in</small>
            </div>

          </div>

          <div class="discord-divider"></div>

          <!-- ACTIONS -->
          <button id="signInBtn">Sign In</button>
          <button id="signUpBtn">Sign Up</button>
          <button id="signOutBtn" class="danger hidden">Sign Out</button>

        </div>
      </div>
    </div>

  </header>

  <!-- =========================
       MAIN HUB
  ========================== -->
  <main>

    <h2 id="welcomeText">Welcome 👋</h2>

    <button id="playBtn" class="play-btn">
      ▶ Play
    </button>

    <!-- STATUS FEEDBACK -->
    <p id="authStatus" style="margin-top:10px; font-weight:600;"></p>

    <!-- =========================
         SIGN UP POPUP
    ========================== -->
    <div id="signUpPopup" class="popup-overlay">

      <div class="popup-content">

        <span id="closePopup">&times;</span>

        <h2>Create Account</h2>

        <form id="signUpForm">

          <input type="text" id="displayName" placeholder="Name" required>
          <input type="number" id="age" placeholder="Age" required>
          <input type="email" id="signupEmail" placeholder="Email" required>
          <input type="password" id="signupPassword" placeholder="Password" required>

          <button type="submit">Create Account</button>

        </form>

      </div>

    </div>

    <!-- =========================
         USERNAME POPUP
    ========================== -->
    <div id="usernamePopup" class="popup-overlay" style="display:none;">

      <div class="popup-content">

        <h2>Choose Username</h2>

        <input
          id="usernameInput"
          placeholder="Enter username"
          maxlength="30"
        >

        <button id="saveUsernameBtn">Save</button>

      </div>

    </div>

  </main>

  <script type="module" src="home.js"></script>

</body>

</html>
