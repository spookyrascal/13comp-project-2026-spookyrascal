<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess The Number</title>
  <link rel="stylesheet" href="../../style.css">
</head>

<body>

<header>
  <h1>🎯 Guess The Number</h1>
</header>

<main>

  <!-- LOBBY -->
  <div id="lobby">
    <h2>Lobby</h2>

    <button id="createGameBtn">Create Game</button>

    <h3>Available Games</h3>
    <div id="gameList"></div>
  </div>

  <!-- GAME AREA -->
  <div id="gameArea" class="hidden">

    <p id="statusText"></p>
    <p id="opponentText"></p>
    <p id="turnText"></p>

    <input type="number" id="guessInput" placeholder="Guess 1–100">
    <button id="guessBtn">Submit Guess</button>

    <p id="feedback"></p>

    <h3>Your Guesses</h3>
    <div id="history"></div>

  </div>

</main>

<script type="module" src="GTN.js"></script>

</body>
</html>
