<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guess The Number</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<!-- =========================
     BOOT SCREEN
========================= -->
<div id="bootScreen">
  <div class="bootContent">
    <div class="logoPulse">GAME HUB</div>
    <div class="bootBar"></div>
    <p class="bootText">Loading systems...</p>
  </div>
</div>

<!-- =========================
     HEADER
========================= -->
<header class="topbar headerBase">

  <div class="header-left">
  </div>

  <div class="header-right">
    <img
      id="profileImage"
      class="profile-img"
      src="./Images/defaultPFP.jpg"
      alt="Profile"
    />
  </div>

</header>
<!-- =========================
     MAIN
========================= -->
<main>

  <!-- =========================
       LOBBY
  ========================== -->
  <section id="lobbySection" class="card">

    <h2>Lobby</h2>

    <div class="createBox">
      <input id="lobbyNameInput" class="input" placeholder="Lobby name" />
      <button id="createGameBtn" class="btn-primary" type="button">
        Create Game 
      </button> 
    </div>

    <div id="lobbyList"></div>

  </section>

  <!-- =========================
       GAME
  ========================== -->
 <section id="gameSection" class="card hidden">

  <h2>Game</h2>

  <div class="gameInfo">
    <p id="opponentInfo">Opponent: ...</p>
    <p id="turnInfo">Waiting for game...</p>
  </div>

  <div id="statusBanner" class="status-banner"></div>

  <div class="guessBox">
    <input id="guessInput" class="input" type="number" min="1" max="100" placeholder="1–100"/>
    <button id="guessBtn" class="btn-primary">Guess</button>
  </div>

  <p id="feedback" class="feedback"></p>

  <div id="guessHistory" class="history"></div>

  <button id="leaveBtn" class="btn-secondary">Leave Game</button>

</section>
  <!-- =========================
       WIN SCREEN
  ========================== -->
<section id="winScreen" class="card hidden">

  <div class="winCard">

    <h1 id="winText"></h1>
    <p id="winStats"></p>

    <div class="winButtons">
      <button id="playAgainBtn" class="btn-primary">Play Again</button>
      <button id="returnLobbyBtn" class="btn-secondary">Return to Lobby</button>
    </div>

  </div>

</section>

</main>

<script type="module" src="./GTN.js"></script>
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="ui.js"></script>
</body>
</html>
