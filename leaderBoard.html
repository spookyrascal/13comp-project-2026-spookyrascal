<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- HEADER -->
  <header class="leaderboardHeader">

    <h1>🏆 Leaderboard</h1>

    <div class="profileContainer">

      <div class="profileMini">

        <img
          id="profileImage"
          class="profile-img"
          src="./Images/defaultPFP.jpg"
          alt="Profile"
        />

        <p id="profileName">Guest</p>

      </div>

    </div>

  </header>

  <!-- MAIN -->
  <main>

    <div class="tableWrap">
      <table id="LeaderboardTable">

        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Wins</th>
            <th>Games</th>
            <th>Win Rate</th>
            <th>Best Score</th>
          </tr>
        </thead>

        <tbody></tbody>

      </table>
    </div>

    <button class="backBtn" onclick="location.href='games.html'">
      ← Back
    </button>

  </main>

  <script type="module" src="./leaderboard.js"></script>

</body>
</html>
