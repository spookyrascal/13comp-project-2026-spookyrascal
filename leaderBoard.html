<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- =========================
     BOOT SCREEN
========================= -->
<div id="bootScreen">
  <div class="bootContent">
    <div class="logoPulse">GAME HUB</div>
    <div class="bootBar"></div>
    <p class="bootText">Loading systems...</p>
  </div>
</div>

<!-- =========================
     HEADER
========================= -->
<header class="leaderboardHeader">

  <h1>Leaderboard</h1>

  <div class="profileContainer">

    <div class="profileMini">

      <img
        id="profileImage"
        class="profile-img"
        src="./Images/defaultPFP.jpg"
        alt="User profile image"
      />

      <button id="profileBtn" class="profileBtn" type="button">
        Open Profile
      </button>

      <p id="profileName">Guest</p>

    </div>

  </div>

</header>

<!-- =========================
     PODIUM
========================= -->
<section id="podium" class="podium">

  <div class="podiumSpot second">
    <h3>2</h3>
    <img id="p2Img" src="./Images/defaultPFP.jpg" alt="Second place">
    <p id="p2Name">---</p>
    <span id="p2Wins">0 wins</span>
  </div>

  <div class="podiumSpot first">
    <h3>1</h3>
    <img id="p1Img" src="./Images/defaultPFP.jpg" alt="First place">
    <p id="p1Name">---</p>
    <span id="p1Wins">0 wins</span>
  </div>

  <div class="podiumSpot third">
    <h3>3</h3>
    <img id="p3Img" src="./Images/defaultPFP.jpg" alt="Third place">
    <p id="p3Name">---</p>
    <span id="p3Wins">0 wins</span>
  </div>

</section>

<!-- =========================
     MAIN TABLE
========================= -->
<main>

  <div class="tableWrap">

    <table id="leaderboardTable">

      <thead>
        <tr>
          <th>Rank</th>
          <th>Player</th>
          <th>Wins</th>
          <th>Games</th>
          <th>Win Rate</th>
          <th>Best Score</th>
        </tr>
      </thead>

      <tbody></tbody>

    </table>

  </div>

  <button id="backBtn" class="backBtn" type="button">
    ← Back
  </button>

</main>

<script type="module" src="./leaderboard.js"></script>

</body>
</html>
