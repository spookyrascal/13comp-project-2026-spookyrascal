<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="leaderboardHeader">

    <h1>🏆 Leaderboard</h1>

<!-- PROFILE -->
<div class="profileContainer">

  <div class="profileMini">

    <img
      id="profileImage"
      class="profile-img"
      src="./Images/defaultPFP.jpg"
      alt="Profile Picture"
    >

    <div class="profileText">
      <p id="profileName">Guest</p>
    </div>
  </div>
</div>

  <!-- =========================
       MAIN TABLE
  ========================== -->
  <main>

    <div class="tableWrap">

      <table id="LeaderboardTable">

        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Wins</th>
            <th>Games Played</th>
            <th>Win Rate</th>
          </tr>
        </thead>

        <tbody>
          <!-- JS injects rows here -->
        </tbody>

      </table>

    </div>

    <!-- Back Button -->
    <button class="backBtn" onclick="history.back()">
      ← Back
    </button>

  </main>

  <!-- =========================
       SCRIPTS 
  ========================== -->
  <script type="module" src="./leaderBoard.js"></script>

</body>

</html>
