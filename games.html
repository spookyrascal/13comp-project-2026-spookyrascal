<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- =========================
     BOOT SCREEN
========================= -->
<div id="bootScreen">
  <div class="bootContent">
    <div class="logoPulse">GAME HUB</div>
    <div class="bootBar"></div>
    <p class="bootText">Loading systems...</p>
  </div>
</div>

<!-- =========================
     HEADER
========================= -->
<header class="topbar">

  <h1>Game Hub</h1>

  <div class="profile-wrapper">
    <button id="profileBtn" class="profileBtn" type="button">
      <img
        id="profileImage"
        class="profile-img"
        src="./Images/defaultPFP.jpg"
        alt="User profile picture"
      />
    </button>
  </div>

</header>

<!-- =========================
     MAIN CONTENT
========================= -->
<main>

  <h2>Choose a Game</h2>

  <section class="gameContainer">

    <a href="meteorRush.html" class="gameCard">
      <img src="./Images/meteorRush.jpg" alt="Meteor Rush" />
      <h3>Meteor Rush</h3>
      <p>Dodge meteors and survive</p>
    </a>

    <a href="GTN.html" class="gameCard">
      <img src="./Images/gtn.jpg" alt="Guess The Number" />
      <h3>Guess The Number</h3>
      <p>Multiplayer guessing battle</p>
    </a>

    <a href="leaderBoard.html" class="gameCard">
      <img src="./Images/trophy.png" alt="Leaderboard" />
      <h3>Leaderboard</h3>
      <p>Top players ranked</p>
    </a>

  </section>

</main>

<script type="module" src="games.js"></script>

</body>
</html>
