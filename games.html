<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">

  <h1>Game Hub</h1>

  <div class="profile-wrapper">
    <img
      id="profileImage"
      class="profile-img"
      src="./Images/defaultPFP.jpg"
      alt="User profile picture"
    />
  </div>

</header>

<main>

  <h2>Choose a Game</h2>

  <!-- LOBBY SECTION -->
  <section id="lobbySection" class="gameContainer">

    <div class="lobbyCreate">
      <input id="lobbyNameInput" placeholder="Lobby name..." />
      <button id="createGameBtn">Create Game</button>
    </div>

    <div id="lobbyList"></div>

  </section>

  <!-- GAME SECTION -->
  <section id="gameSection" class="hidden">

    <div id="opponentInfo">Opponent: ...</div>
    <div id="turnInfo">Loading...</div>

    <input id="guessInput" type="number" placeholder="Your guess" />
    <button id="guessBtn">Guess</button>

  </section>

  <!-- STATIC GAME CARDS -->
  <section class="gameContainer">

    <a href="meteorRush.html" class="gameCard">
      <img src="./Images/meteorRush.jpg">
      <h3>Meteor Rush</h3>
      <p>Dodge meteors and survive</p>
    </a>

    <a href="GTN.html" class="gameCard">
      <img src="./Images/gtn.jpg">
      <h3>Guess The Number</h3>
      <p>Multiplayer guessing battle</p>
    </a>

    <a href="leaderBoard.html" class="gameCard leaderboardCard">
      <img src="./Images/trophy.png">
      <h3>Leaderboard</h3>
      <p>Top players ranked</p>
    </a>

  </section>

</main>

<script type="module" src="games.js"></script>

</body>
</html>
