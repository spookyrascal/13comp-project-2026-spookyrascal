<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>My Profile</title>

  <link rel="stylesheet" href="style.css"/>

</head>

<body>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- HEADER -->
  <header class="topbar">

    <h1>My Profile</h1>

    <div class="profileMiniHeader">

      <img
        id="headerProfileImage"
        class="profile-img"
        src="./Images/defaultPFP.jpg"
        alt="Profile Picture"
      />

      <button id="backBtn" class="btn-secondary">
        ← Back
      </button>

    </div>

  </header>

  <!-- MAIN -->
  <main class="profilePage">

    <!-- HERO -->
    <section class="profileHero">

      <img
        id="profilePreview"
        class="heroAvatar"
        src="./Images/defaultPFP.jpg"
        alt="User Avatar"
      />

      <div class="profileInfo">

        <h2 id="profileDisplayName">Loading...</h2>

        <p id="profileEmail">loading...</p>

        <p id="profileAge">Age: --</p>

      </div>

    </section>

    <!-- STATS -->
    <section class="statsGrid">

      <div class="statCard stat-win">
        <h3>Wins</h3>
        <div class="value" id="winsStat">0</div>
      </div>

      <div class="statCard stat-loss">
        <h3>Losses</h3>
        <div class="value" id="lossesStat">0</div>
      </div>

      <div class="statCard">
        <h3>Games Played</h3>
        <div class="value" id="gamesStat">0</div>
      </div>

      <div class="statCard">
        <h3>Win Rate</h3>
        <div class="value" id="rateStat">0%</div>
      </div>

    </section>

    <!-- EDIT PROFILE -->
<section class="profileSection">

  <h3>Edit Profile</h3>

  <label>Username</label>
  <input
    id="usernameInput"
    type="text"
    maxlength="20"
    placeholder="New username"
  />

  <label>Email</label>
  <input
    id="emailInput"
    type="email"
    placeholder="Enter email"
  />

  <label>Age</label>
  <input
    id="ageInput"
    type="number"
    min="1"
    max="120"
    placeholder="Age"
  />

  <label>Profile Photo URL</label>
  <input
    id="photoInput"
    type="text"
    placeholder="Paste image URL"
  />

  <img
    id="livePreview"
    class="editPreview"
    src="./Images/defaultPFP.jpg"
    alt="Preview"
  />

  <button id="saveProfileBtn" class="btn-primary saveBtn">
    Save Changes
  </button>

</section>

    <!-- ACHIEVEMENTS -->
    <section class="profileSection">

      <h3>Achievements</h3>

      <div class="badgeRow" id="badgeRow"></div>

    </section>

  </main>

  <script type="module" src="./profile.js"></script>

</body>

</html>
