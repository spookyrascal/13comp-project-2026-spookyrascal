<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>

<div id="toast"></div>

<header class="mainHeader">

  <h1>My Profile</h1>

  <div class="userBox">
    <img id="headerProfileImage" src="./Images/defaultPFP.jpg" />
    <span id="profileDisplayName">Loading...</span>
    <button id="backBtn">Back</button>
  </div>

</header>

<main class="profilePage">

  <section>
    <img id="profilePreview" src="./Images/defaultPFP.jpg" />
    <p id="profileEmail"></p>
    <p id="profileAge"></p>
  </section>

  <section>
    <h3>Stats</h3>

    <p>Wins: <span id="winsStat">0</span></p>
    <p>Losses: <span id="lossesStat">0</span></p>
    <p>Games: <span id="gamesStat">0</span></p>
    <p>Win Rate: <span id="rateStat">0</span></p>
  </section>

  <!-- EDIT MODAL -->
  <section>

    <div id="editModal" class="modal hidden">
      <div class="modalCard">

        <h2>Edit Profile</h2>

        <input id="usernameInput" placeholder="Username" />

        <!-- email stays locked -->
        <input id="emailInput" disabled />

        <input id="ageInput" type="number" placeholder="Age" />

        <!-- URL input -->
        <input id="pfpUrlInput" placeholder="Profile picture URL" />

        <img id="livePreview" src="./Images/defaultPFP.jpg" />

        <button id="saveProfileBtn" class="btn-primary">Save</button>
        <button id="closeModalBtn" class="btn-secondary">Close</button>

      </div>
    </div>

    <button id="openEditBtn" class="btn-primary">Edit Profile</button>

  </section>

</main>

<script type="module" src="./profile.js"></script>

</body>
</html>
